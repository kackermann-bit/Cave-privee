<script type="text/babel">
const {useState,useEffect,useRef} = React;

const SURL="https://jiyqrkfgpbkxrtxjsqsh.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppeXFya2ZncGJreHJ0eGpzcXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTM0MzEsImV4cCI6MjA5MzQ2OTQzMX0.ttoX-1bgmKhKq6fYlqAy78Wxk6eCZ1yqx5MdKaueyoA";
const sb=supabase.createClient(SURL,SKEY);
const AK="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";

async function ai(msgs,sys,maxT){
  const body={model:"claude-haiku-4-5-20251001",max_tokens:maxT||1400,messages:msgs};
  if(sys)body.system=sys;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":AK,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||"Fehler "+r.status);}
  const d=await r.json();
  return d.content?.map(b=>b.text||"").join("")||"";
}

function parseJ(raw){
  const s=raw.replace(/```json|```/g,"").trim();
  const m=s.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("Kein JSON erhalten.");
  try{return JSON.parse(m[0]);}catch(e){throw new Error("JSON-Fehler.");}
}

function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});}
function badge(t){return{Rot:"br",Weiss:"bw","Rosé":"bro",Schaum:"bsc","Süss":"bsu"}[t]||"br";}
function td(){return new Date().toISOString().split("T")[0];}

function Ratings({r}){
  if(!r)return null;
  return <div className="rb">
    {r.falstaff>0&&<span className="rf">Falstaff {r.falstaff}</span>}
    {r.parker>0&&<span className="rp">Parker {r.parker}</span>}
    {r.weinwisser>0&&<span className="rw">Weinwisser {r.weinwisser}</span>}
  </div>;
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
function AuthPage({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");

  const go=async()=>{
    setErr("");setOk("");setLoading(true);
    try{
      if(mode==="login"){
        const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
        if(error)throw error;
        onAuth(data.user);
      }else{
        const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{name}}});
        if(error)throw error;
        if(data.user&&!data.session)setOk("Bitte bestätigen Sie Ihre E-Mail, dann können Sie sich anmelden.");
        else if(data.user)onAuth(data.user);
      }
    }catch(e){
      const m=e.message||"";
      if(m.includes("Invalid login"))setErr("E-Mail oder Passwort falsch.");
      else if(m.includes("already registered"))setErr("Diese E-Mail ist bereits registriert.");
      else if(m.includes("Password"))setErr("Passwort muss mind. 6 Zeichen haben.");
      else setErr(m);
    }
    setLoading(false);
  };

  return <div className="auth-wrap">
    <div className="auth-box">
      <div className="auth-logo">Cave <em>Privée</em></div>
      <div className="auth-sub">Privater Weinkeller</div>
      <div className="auth-tabs">
        <button className={`auth-tab${mode==="login"?" on":""}`} onClick={()=>{setMode("login");setErr("");setOk("");}}>Anmelden</button>
        <button className={`auth-tab${mode==="register"?" on":""}`} onClick={()=>{setMode("register");setErr("");setOk("");}}>Registrieren</button>
      </div>
      {err&&<div className="msg-err">⚠ {err}</div>}
      {ok&&<div className="msg-ok">✓ {ok}</div>}
      {mode==="register"&&<div style={{marginBottom:".85rem"}}><label className="fl">Name</label><input className="fi" placeholder="Max Mustermann" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>}
      <div style={{marginBottom:".85rem"}}><label className="fl">E-Mail</label><input className="fi" type="email" placeholder="max@beispiel.ch" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>
      <div style={{marginBottom:"1.4rem"}}><label className="fl">Passwort</label><input className="fi" type="password" placeholder="Mind. 6 Zeichen" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>
      <button className="btn bp btn-full" onClick={go} disabled={loading||!email||!pw}>
        {loading?<><div className="sp" style={{borderTopColor:"#fff"}}/> Bitte warten…</>:mode==="login"?"Anmelden":"Konto erstellen"}
      </button>
      <div style={{marginTop:"1rem",textAlign:"center",fontSize:".75rem",color:"var(--muted)"}}>
        {mode==="login"
          ?<span>Noch kein Konto? <button style={{background:"none",border:"none",color:"var(--burg)",cursor:"pointer",fontSize:".75rem"}} onClick={()=>{setMode("register");setErr("");setOk("");}}>Registrieren</button></span>
          :<span>Bereits registriert? <button style={{background:"none",border:"none",color:"var(--burg)",cursor:"pointer",fontSize:".75rem"}} onClick={()=>{setMode("login");setErr("");setOk("");}}>Anmelden</button></span>
        }
      </div>
    </div>
  </div>;
}

// ─── Remove Popup ──────────────────────────────────────────────────────────────
function RemovePopup({wine,onConfirm,onCancel}){
  const [reason,setReason]=useState("");
  const opts=["Getrunken","Verschenkt","Verkauft","Fehler / Bestandskorrektur"];
  return <div className="popup-ov">
    <div className="popup-box">
      <div className="popup-title">Aus dem Keller entfernen</div>
      <p style={{fontSize:".82rem",color:"var(--muted)",marginBottom:"1rem"}}>{wine.name} {wine.vintage>0?wine.vintage:""}</p>
      <div className="popup-opts">
        {opts.map(o=><button key={o} className={`popup-opt${reason===o?" sel":""}`} onClick={()=>setReason(o)}>{o}</button>)}
      </div>
      <div style={{display:"flex",gap:".55rem",justifyContent:"flex-end"}}>
        <button className="btn bo" onClick={onCancel}>Abbrechen</button>
        <button className="btn bp" disabled={!reason} onClick={()=>onConfirm(reason)}>Entfernen</button>
      </div>
    </div>
  </div>;
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function WineApp({user,onLogout}){
  const [wines,setWines]=useState([]);
  const [tab,setTab]=useState("keller");
  const [sel,setSel]=useState(null);
  const [detTab,setDetTab]=useState("beschreibung");
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  const [updating,setUpdating]=useState(false);
  const [rmWine,setRmWine]=useState(null);

  // Filters
  const [srch,setSrch]=useState("");
  const [fTyp,setFTyp]=useState("");
  const [fReb,setFReb]=useState("");
  const [fReg,setFReg]=useState("");
  const [fJahr,setFJahr]=useState("");
  const [fFuel,setFFuel]=useState("");
  const [fPreis,setFPreis]=useState("");
  const [fTrink,setFTrink]=useState("");
  const [fSpeise,setFSpeise]=useState("");
  const [fAusz,setFAusz]=useState("");
  const [fVerfug,setFVerfug]=useState("");

  // Add form
  const emptyForm={name:"",estate:"",vintage:"",type:"Rot",region:"",country:"",grape:"",purchasePrice:"",purchaseDate:td(),purchaseLocation:"",bottleSize:"0.75L",lagerplatz:""};
  const [form,setForm]=useState(emptyForm);
  const [aiLoad,setAiLoad]=useState(false);
  const [steps,setSteps]=useState([]);
  const [imgData,setImgData]=useState(null);
  const [scanLoad,setScanLoad]=useState(false);

  // Chat
  const [chatMsgs,setChatMsgs]=useState([{r:"bot",t:`Willkommen${user.user_metadata?.name?", "+user.user_metadata.name:""}! Ich bin Ihr Sommelier. Wie kann ich helfen?`}]);
  const [chatIn,setChatIn]=useState("");
  const [chatLoad,setChatLoad]=useState(false);
  const chatEnd=useRef(null);

  // Load from Supabase
  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const{data,error}=await sb.from("wines").select("*").order("created_at",{ascending:false});
      if(!error&&data){
        const ws=data.map(r=>({...r.data,_id:r.id}));
        setWines(ws);
        // Auto-update prices & ratings after 1.5s delay
        setTimeout(()=>runAutoUpdate(ws),1500);
      }
      setLoading(false);
    })();
  },[]);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[chatMsgs]);

  const showToast=(msg,err=false)=>{setToast({msg,err});setTimeout(()=>setToast(null),4000);};

  // Auto-update prices & ratings for all wines
  const runAutoUpdate=async(wineList)=>{
    if(!wineList||wineList.length===0)return;
    setUpdating(true);
    for(let i=0;i<wineList.length;i+=2){
      const batch=wineList.slice(i,i+2);
      await Promise.all(batch.map(w=>updateOneWine(w)));
      if(i+2<wineList.length)await new Promise(r=>setTimeout(r,500));
    }
    setUpdating(false);
  };

  const updateOneWine=async(wine)=>{
    try{
      const prompt=`Weinexperte Schweiz. NUR JSON, kein anderer Text.
Wein: ${wine.name}, ${wine.estate||""}, ${wine.vintage||""}, ${wine.type}, ${wine.region||""}
{"marketPrice":0,"marketPriceSource":"konkreter Schweizer Shop z.B. hawesko.ch oder martel.ch","ratings":{"falstaff":0,"parker":0,"weinwisser":0}}
Verwende 0 für unbekannte Bewertungen.`;
      const raw=await ai([{role:"user",content:prompt}],null,500);
      const upd=parseJ(raw);
      const updated={...wine,
        marketPrice:upd.marketPrice||wine.marketPrice||0,
        marketPriceSource:upd.marketPriceSource||wine.marketPriceSource||"",
        ratings:{
          falstaff:upd.ratings?.falstaff||wine.ratings?.falstaff||0,
          parker:upd.ratings?.parker||wine.ratings?.parker||0,
          weinwisser:upd.ratings?.weinwisser||wine.ratings?.weinwisser||0
        }
      };
      await sb.from("wines").update({data:updated}).eq("id",wine._id);
      setWines(prev=>prev.map(w=>w._id===wine._id?updated:w));
      setSel(prev=>prev&&prev._id===wine._id?updated:prev);
    }catch(e){/* silent fail */}
  };

  // Derived
  const allGrapes=[...new Set(wines.flatMap(w=>(w.grape||"").split(",").map(g=>g.trim())).filter(Boolean))].sort();
  const allRegions=[...new Set(wines.map(w=>w.region).filter(Boolean))].sort();
  const allJahre=[...new Set(wines.map(w=>w.vintage).filter(v=>v>0))].sort((a,b)=>b-a);
  const allFuel=[...new Set(wines.map(w=>w.bottleSize).filter(Boolean))];
  const PREIS_OPTS=["Bis CHF 50","Bis CHF 100","Bis CHF 200","Bis CHF 400","Ab CHF 400","Kollektion (ab CHF 1000)"];
  const TRINK_OPTS=["Gut / Trinken","Gut / Trinken oder Lagern","Gut / Lagern","Weg oder Trinken","Ausgezeichnet / Trinken","Ausgezeichnet / Trinken oder Lagern","Ausgezeichnet / Lagern"];

  const filteredWines=wines.filter(w=>{
    const q=srch.toLowerCase();
    const ms=!srch||[w.name,w.estate,w.region,w.country,w.grape||"",w.appellation||""].some(x=>(x||"").toLowerCase().includes(q));
    const mt=!fTyp||w.type===fTyp;
    const mr=!fReb||(w.grape||"").toLowerCase().includes(fReb.toLowerCase());
    const mrg=!fReg||w.region===fReg;
    const mj=!fJahr||String(w.vintage)===fJahr;
    const mf=!fFuel||w.bottleSize===fFuel;
    const msp=!fSpeise||(w.food||[]).some(f=>f.toLowerCase().includes(fSpeise.toLowerCase()));
    const ma=!fAusz||(w.awards||[]).some(a=>a.toLowerCase().includes(fAusz.toLowerCase()));
    const mv=!fVerfug||(w.bottles||0)>0;
    const p=w.purchasePrice||0;
    const mp=!fPreis||(
      fPreis==="Bis CHF 50"?p<=50:
      fPreis==="Bis CHF 100"?p<=100:
      fPreis==="Bis CHF 200"?p<=200:
      fPreis==="Bis CHF 400"?p<=400:
      fPreis==="Ab CHF 400"?p>400:
      fPreis==="Kollektion (ab CHF 1000)"?p>=1000:true
    );
    return ms&&mt&&mr&&mrg&&mj&&mf&&msp&&ma&&mv&&mp;
  });

  const totB=wines.reduce((s,w)=>s+(w.bottles||0),0);
  const totV=wines.reduce((s,w)=>s+(w.purchasePrice||0)*(w.bottles||0),0);
  const avgP=wines.length?Math.round(wines.reduce((s,w)=>s+(w.purchasePrice||0),0)/wines.length):0;

  // DB
  const dbSave=async(d)=>{const{data,e}=await sb.from("wines").insert({user_id:user.id,data:d}).select().single();if(e)throw new Error(e.message);return data;};
  const dbUpd=async(id,d)=>{const{error}=await sb.from("wines").update({data:d}).eq("id",id);if(error)throw new Error(error.message);};
  const dbDel=async(id)=>{const{error}=await sb.from("wines").delete().eq("id",id);if(error)throw new Error(error.message);};

  // Scan label
  const handleScan=async(file)=>{
    if(!file)return;setScanLoad(true);
    try{
      const b64=await toB64(file);
      const mt=file.type||"image/jpeg";
      setImgData({url:URL.createObjectURL(file),b64,mt});
      const body={model:"claude-haiku-4-5-20251001",max_tokens:400,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mt,data:b64}},
        {type:"text",text:'Analysiere dieses Weinetikett. Antworte NUR mit JSON: {"name":"","estate":"","vintage":"","type":"Rot","region":"","country":"","grape":""} — type=Rot|Weiss|Rosé|Schaum|Süss. Unbekanntes leer lassen.'}
      ]}]};
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":AK,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
      const d=await r.json();
      const p=parseJ(d.content?.map(b=>b.text||"").join("")||"");
      setForm(prev=>({...prev,...Object.fromEntries(Object.entries(p).filter(([,v])=>v))}));
      showToast("✓ Etikett erkannt — bitte Felder prüfen");
    }catch{showToast("Etikett konnte nicht gelesen werden",true);}
    setScanLoad(false);
  };

  const markStep=id=>setSteps(p=>p.map((s,i,a)=>s.id===id?{...s,done:true,act:false}:a[a.findIndex(x=>x.id===id)+1]?.id===s.id?{...s,act:true}:s));

  // Add wine with AI
  const handleAdd=async()=>{
    if(!form.name.trim()){showToast("Bitte Weinnamen eingeben",true);return;}
    if(aiLoad)return;
    setAiLoad(true);
    setSteps([
      {id:"a",label:"Weinname & Weingut prüfen",done:false,act:true},
      {id:"b",label:"Beschreibung, Entstehung & Daten",done:false,act:false},
      {id:"c",label:"Trinkreife, Speisen & Bewertungen",done:false,act:false},
      {id:"d",label:"Flaschenfoto & Marktpreis Schweiz",done:false,act:false},
      {id:"e",label:"Im Keller speichern",done:false,act:false},
    ]);

    const wi=`${form.name}|${form.estate||"?"}|${form.vintage||"?"}|${form.type}|${form.region||"?"}|${form.country||"?"}|${form.grape||"?"}`;

    const pVerify=`Du bist Weinexperte. Prüfe ob Name und Weingut korrekt sind und korrigiere falls nötig. Antworte NUR mit JSON:
Name: "${form.name}", Weingut: "${form.estate||""}", Region: "${form.region||""}"
{"name":"korrekter Weinname","estate":"korrektes Weingut","corrected":true}`;

    const p1=`Weinexperte Schweiz. Antworte AUSSCHLIESSLICH mit validem JSON auf Deutsch, kein anderer Text.
Wein: ${wi}
WICHTIG: grape, region und country MUESSEN immer ausgefuellt sein. besonderheiten ist ein Pflichtfeld.
{"description":"3 Sätze Farbe/Nase/Gaumen/Abgang","estateDesc":"2 Sätze Geschichte des Weinguts","besonderheiten":"2-3 Sätze über besondere Merkmale, Alleinstellungsmerkmale oder interessante Fakten zu diesem Wein","oenologist":"Name Önologe","soil":"Bodentyp","harvest":"Leseart","vinification":"Vinifikation","ageing":"Ausbau","residualSugar":"X g/L","alcohol":"X%","appellation":"Herkunftsbezeichnung","optimalTemp":"XX-XX Grad C","glassShape":"Glasform","premiumGlass":"Riedel-Modell","drinkingWindow":"JJJJ-JJJJ","peakYears":"JJJJ-JJJJ","drinkingWindowSource":"Quelle","grape":"PFLICHT: Rebsorte(n) immer ausfuellen","region":"PFLICHT: Region immer ausfuellen","country":"PFLICHT: Land immer ausfuellen","ratings":{"falstaff":0,"parker":0,"weinwisser":0},"awards":["Auszeichnung1"]}`;

    const p2=`Weinexperte Schweiz. Antworte AUSSCHLIESSLICH mit validem JSON auf Deutsch, kein anderer Text.
Wein: ${wi}
Fuer imageUrl: Gib eine echte funktionierende URL zu einem Flaschenbild dieses Weins zurueck. Bevorzuge vivino.com Bilder im Format https://images.vivino.com/thumbs/XXXXX_pb_x600.png. Falls nicht bekannt, leeren String zurueckgeben.
{"food":["Gericht 1","Gericht 2","Gericht 3","Gericht 4","Gericht 5","Gericht 6","Gericht 7","Gericht 8","Gericht 9","Gericht 10","Gericht 11","Gericht 12"],"marketPrice":0,"marketPriceSource":"Schweizer Shop z.B. hawesko.ch martel.ch steinfels.ch","imageUrl":""}`;

    try{
      markStep("a");
      const [rV,r1,r2]=await Promise.all([
        ai([{role:"user",content:pVerify}],null,300),
        ai([{role:"user",content:p1}]),
        ai([{role:"user",content:p2}])
      ]);
      markStep("b");

      let corrName=form.name,corrEstate=form.estate||"";
      try{const v=parseJ(rV);corrName=v.name||form.name;corrEstate=v.estate||form.estate||"";}catch{}

      const ai1=parseJ(r1);markStep("c");
      const ai2=parseJ(r2);markStep("d");

      const lager=form.lagerplatz.trim()?[{fach:form.lagerplatz.trim(),groesse:form.bottleSize,anzahl:parseInt(form.bottles)||1}]:[];

      const wineData={
        id:Date.now(),
        name:corrName,
        estate:corrEstate,
        vintage:parseInt(form.vintage)||0,
        type:form.type,
        region:ai1.region||form.region||"",
        country:ai1.country||form.country||"",
        grape:ai1.grape||form.grape||"",
        appellation:ai1.appellation||"",
        bottles:parseInt(form.bottles)||1,
        bottleSize:form.bottleSize,
        purchasePrice:parseFloat(form.purchasePrice)||0,
        purchaseDate:form.purchaseDate||td(),
        purchaseLocation:form.purchaseLocation||"",
        lager,
        image:imgData?.url||(ai2.imageUrl&&ai2.imageUrl.startsWith("http")?ai2.imageUrl:"")||"",
        description:ai1.description||"",
        estateDesc:ai1.estateDesc||"",
        besonderheiten:ai1.besonderheiten||"",
        oenologist:ai1.oenologist||"",
        soil:ai1.soil||"",
        harvest:ai1.harvest||"",
        vinification:ai1.vinification||"",
        ageing:ai1.ageing||"",
        residualSugar:ai1.residualSugar||"",
        alcohol:ai1.alcohol||"",
        optimalTemp:ai1.optimalTemp||"",
        glassShape:ai1.glassShape||"",
        premiumGlass:ai1.premiumGlass||"",
        drinkingWindow:ai1.drinkingWindow||"",
        peakYears:ai1.peakYears||"",
        drinkingWindowSource:ai1.drinkingWindowSource||"",
        ratings:ai1.ratings||{falstaff:0,parker:0,weinwisser:0},
        awards:ai1.awards||[],
        food:ai2.food||[],
        marketPrice:ai2.marketPrice||0,
        marketPriceSource:ai2.marketPriceSource||"",
        cellarLog:[{date:form.purchaseDate||td(),type:"in",bottles:parseInt(form.bottles)||1,price:parseFloat(form.purchasePrice)||0,note:`Eingekauft${form.purchaseLocation?" bei "+form.purchaseLocation:""}`,fach:form.lagerplatz||""}]
      };

      const saved=await dbSave(wineData);
      markStep("e");
      setWines(p=>[{...wineData,_id:saved.id},...p]);
      setForm(emptyForm);
      setImgData(null);
      setSteps([]);
      setTab("keller");
      showToast(`✓ "${corrName}" wurde im Keller gespeichert`);
    }catch(e){showToast("Fehler: "+e.message,true);setSteps([]);}
    setAiLoad(false);
  };

  // Remove wine
  const handleRemoveConfirm=async(reason)=>{
    if(!rmWine)return;
    try{
      await dbDel(rmWine._id);
      setWines(p=>p.filter(x=>x._id!==rmWine._id));
      setSel(null);
      showToast(`"${rmWine.name}" entfernt (${reason})`);
    }catch(e){showToast("Fehler: "+e.message,true);}
    setRmWine(null);
  };

  // Move bottles
  const movBottles=async(wine,delta)=>{
    const nb=Math.max(0,(wine.bottles||0)+delta);
    const log={date:td(),type:delta>0?"in":"out",bottles:Math.abs(delta),price:delta>0?(wine.purchasePrice||0):null,note:delta>0?"Zukauf":"Entnahme",fach:""};
    const updated={...wine,bottles:nb,cellarLog:[...(wine.cellarLog||[]),log]};
    try{
      await dbUpd(wine._id,updated);
      setWines(p=>p.map(w=>w._id===wine._id?updated:w));
      setSel(prev=>prev&&prev._id===wine._id?updated:prev);
    }catch(e){showToast("Fehler: "+e.message,true);}
  };

  // Manual price update
  const manualUpdate=async(wine)=>{
    showToast("Aktualisierung läuft…");
    await updateOneWine(wine);
    showToast("✓ Preis & Bewertungen aktualisiert");
  };

  // Add lager slot
  const addLager=async(wine,fach)=>{
    if(!fach.trim())return;
    const updLager=[...(wine.lager||[]),{fach:fach.trim(),groesse:wine.bottleSize,anzahl:1}];
    const updated={...wine,lager:updLager};
    try{
      await dbUpd(wine._id,updated);
      setWines(p=>p.map(w=>w._id===wine._id?updated:w));
      setSel(updated);
      showToast("Lagerplatz hinzugefügt ✓");
    }catch(e){showToast("Fehler: "+e.message,true);}
  };

  // Chat
  const handleChat=async()=>{
    if(!chatIn.trim()||chatLoad)return;
    const msg=chatIn.trim();setChatIn("");
    setChatMsgs(p=>[...p,{r:"user",t:msg}]);setChatLoad(true);
    const ctx=wines.map(w=>`• ${w.name} (${w.estate||""}), ${w.vintage||"NV"}, ${w.type}, ${w.region||"?"}/${w.country||"?"}, ${w.bottles}Fl. CHF${w.purchasePrice||0}, Parker:${w.ratings?.parker||"?"}, Falstaff:${w.ratings?.falstaff||"?"}, Trinkreife:${w.drinkingWindow||"?"}`).join("\n");
    const sys=`Du bist Sommelier für den privaten Weinkeller von ${user.user_metadata?.name||user.email} in der Schweiz. Antworte präzise und auf Deutsch. Aktuelle Sammlung:\n${ctx}`;
    try{const rep=await ai([{role:"user",content:msg}],sys);setChatMsgs(p=>[...p,{r:"bot",t:rep}]);}
    catch{setChatMsgs(p=>[...p,{r:"bot",t:"Fehler. Bitte erneut versuchen."}]);}
    setChatLoad(false);
  };

  const logout=async()=>{await sb.auth.signOut();onLogout();};
  const resetFilters=()=>{setSrch("");setFTyp("");setFReb("");setFReg("");setFJahr("");setFFuel("");setFPreis("");setFTrink("");setFSpeise("");setFAusz("");setFVerfug("");};

  const DTABS=[["beschreibung","Beschreibung"],["besonderheiten","Besonderheiten"],["entstehung","Entstehung"],["daten","Daten"],["trinkreife","Trinkreife"],["speisen","Speisen"],["bewertungen","Bewertungen"],["lager","Lagerplätze"],["report","Kellerreport"],["preise","Preise"]];

  const WineCard=({w})=>(
    <div className="wc" onClick={()=>{setSel(w);setDetTab("beschreibung");}}>
      <div className="wci">
        <span className={`wtb ${badge(w.type)}`}>{w.type}</span>
        {(w.lager||[]).length>0&&<span className="loc-badge">{w.lager.map(l=>l.fach).join(", ")}</span>}
        {(w.image)?<img src={w.image} alt={w.name} onError={e=>e.target.style.display="none"}/>:<span style={{opacity:.25}}>🍾</span>}
      </div>
      <div className="wcb">
        <div className="wce">{w.estate}</div>
        <div className="wcn">{w.name} {w.vintage>0?w.vintage:"NV"}</div>
        <div className="wcm">
          <span>📍 {w.region||"—"}</span>
          <span>🍇 {(w.grape||"—").split(",")[0].trim()}</span>
          {w.bottleSize&&w.bottleSize!=="0.75L"&&<span>📦 {w.bottleSize}</span>}
        </div>
        <Ratings r={w.ratings}/>
        <div className="wcf">
          <span style={{fontSize:".7rem",color:"var(--muted)"}}><strong style={{color:"var(--burg)",fontSize:".92rem"}}>{w.bottles||0}</strong> Fl.</span>
          <span style={{fontSize:".81rem"}}>CHF {w.purchasePrice||0}</span>
        </div>
      </div>
    </div>
  );

  if(loading)return <div className="loading-screen"><div className="loading-inner"><div className="sp"/><p>Keller wird geladen…</p></div></div>;

  return <div className="app">
    {updating&&<div className="upd-bar"><div className="sp" style={{borderTopColor:"var(--goldl)"}}/> Preise & Bewertungen werden aktualisiert…</div>}

    <header className="hdr">
      <div className="logo">Cave <em>Privée</em></div>
      <div className="hstats">
        <div className="hm"><strong>{totB}</strong>Flaschen</div>
        <div className="hm"><strong>{wines.length}</strong>Positionen</div>
        <div className="hm"><strong>CHF {totV.toLocaleString("de-CH")}</strong>Kellerwert</div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:".18rem"}}>
          <span style={{fontSize:".7rem",color:"rgba(245,240,232,.6)"}}>👤 <span style={{color:"var(--goldl)"}}>{user.user_metadata?.name||user.email}</span></span>
          <button className="btn bo" style={{color:"rgba(245,240,232,.6)",borderColor:"rgba(245,240,232,.2)",fontSize:".62rem",padding:".22rem .55rem"}} onClick={logout}>Abmelden</button>
        </div>
      </div>
    </header>

    <nav className="nav">
      {[["keller","🍾 Keller"],["add","＋ Hinzufügen"],["suche","🔍 Suche"],["chat","💬 Sommelier"]].map(([id,l])=>(
        <button key={id} className={`nb${tab===id?" on":""}`} onClick={()=>setTab(id)}>{l}</button>
      ))}
    </nav>

    <main className="main">

      {/* ── KELLER ── */}
      {tab==="keller"&&<>
        <div className="sg">
          {[["Rot","Rotwein"],["Weiss","Weisswein"],["Schaum","Schaumwein"],["Süss","Süsswein"],["Rosé","Rosé"]].map(([t,l])=>{
            const n=wines.filter(w=>w.type===t).reduce((s,w)=>s+(w.bottles||0),0);

      {/* ── HINZUFÜGEN ── */}

              <div style={{marginBottom:".85rem"}}><label className="fl">Weingut</label><input className="fi" placeholder="z.B. Pétrus" value={form.estate} onChange={e=>setForm(p=>({...p,estate:e.target.value}))}/></div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Jahrgang</label><input className="fi" type="number" placeholder="z.B. 2018" value={form.vintage} onChange={e=>setForm(p=>({...p,vintage:e.target.value}))}/></div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Weintyp</label><select className="fs" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>{["Rot","Weiss","Rosé","Schaum","Süss"].map(t=><option key={t}>{t}</option>)}</select></div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Region</label><input className="fi" placeholder="z.B. Pomerol" value={form.region} onChange={e=>setForm(p=>({...p,region:e.target.value}))}/></div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Land</label><input className="fi" placeholder="z.B. Frankreich" value={form.country} onChange={e=>setForm(p=>({...p,country:e.target.value}))}/></div>
            </div>
            <div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Rebsorte(n)</label><input className="fi" placeholder="z.B. Merlot, Cab. Franc" value={form.grape} onChange={e=>setForm(p=>({...p,grape:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",marginBottom:".85rem"}}>

                <div><label className="fl">Füllmenge</label>
                  <select className="fs" value={form.bottleSize} onChange={e=>setForm(p=>({...p,bottleSize:e.target.value}))}>

                  </select>
                </div>
              </div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Lagerplatz / Fach-Nr.</label><input className="fi" placeholder="z.B. A1, B3" value={form.lagerplatz} onChange={e=>setForm(p=>({...p,lagerplatz:e.target.value}))}/></div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Kaufpreis CHF / Flasche</label><input className="fi" type="number" placeholder="0.00" value={form.purchasePrice} onChange={e=>setForm(p=>({...p,purchasePrice:e.target.value}))}/></div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Kaufdatum</label><input className="fi" type="date" value={form.purchaseDate} onChange={e=>setForm(p=>({...p,purchaseDate:e.target.value}))}/></div>
              <div style={{marginBottom:".85rem"}}><label className="fl">Gekauft bei</label><input className="fi" placeholder="z.B. Martel & Co., Zürich" value={form.purchaseLocation} onChange={e=>setForm(p=>({...p,purchaseLocation:e.target.value}))}/></div>
            </div>
          </div>
          {aiLoad&&steps.length>0&&<div className="ail" style={{flexDirection:"column",alignItems:"flex-start"}}>
            <div style={{display:"flex",gap:".6rem",alignItems:"center",marginBottom:".32rem"}}><div className="sp"/><strong>KI analysiert & speichert…</strong></div>
            <ul className="ais">{steps.map(s=><li key={s.id} className={s.done?"done":s.act?"act":""}>{s.done?"✓":s.act?"→":"○"} {s.label}</li>)}</ul>
          </div>}
          <div style={{display:"flex",gap:".6rem",marginTop:".85rem",justifyContent:"flex-end"}}>
            <button className="btn bo" onClick={()=>{setForm(emptyForm);setImgData(null);}} disabled={aiLoad}>Zurücksetzen</button>
            {aiLoad
              ?<button className="btn bo" onClick={()=>setAiLoad(false)}>✕ Abbrechen</button>
              :<button className="btn bg" disabled={!form.name.trim()} onClick={handleAdd}>✦ Mit KI hinzufügen</button>

          </div>
        </div>
      </div>}

      {/* ── SUCHE ── */}

            <button key={s} className="csugg" onClick={()=>setChatIn(s)}>{s}</button>
          ))}
        </div>
        <div className="cw">
          <div className="cm">
            {chatMsgs.map((m,i)=>(
              <div key={i} className={`cmsg ${m.r==="user"?"cmu":"cmb"}`}>
                <div className="clbl">{m.r==="bot"?"✦ Sommelier":"Sie"}</div>
                <div className="cbbl">{m.t}</div>
              </div>
            ))}
            {chatLoad&&<div className="cmsg cmb"><div className="clbl">✦ Sommelier</div><div className="cbbl"><div className="ail" style={{padding:0,background:"none"}}><div className="sp"/>analysiert…</div></div></div>}
            <div ref={chatEnd}/>

          <div className="cir">

            <button className="csend" onClick={handleChat} disabled={chatLoad}>Senden</button>
          </div>
        </div>
      </div>}

    </main>

        <div className="mh">

              <span style={{color:"var(--goldl)",fontFamily:"'Cormorant Garamond',serif"}}>{sel.bottles||0} Flaschen</span>

              {[["Önologe / Winzer",sel.oenologist],["Rebsorte(n)",sel.grape],["Boden",sel.soil]].map(([l,v])=><div key={l}><div className="il">{l}</div><div className="iv">{v||"—"}</div></div>)}

                <div className="il">Marktpreis Schweiz (KI-aktualisiert)</div>

                {sel.marketPriceSource&&<div style={{fontSize:".71rem",color:"var(--muted)",fontStyle:"italic",marginTop:".14rem"}}>📍 {sel.marketPriceSource}</div>}
              </div>
            </div>
            {sel.marketPrice>0&&sel.purchasePrice>0&&<div style={{background:"var(--parch)",border:"1px solid var(--bdr)",borderRadius:2,padding:"1rem"}}>
              <div className="il" style={{marginBottom:".3rem"}}>Wertzuwachs</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.15rem",color:sel.marketPrice>=sel.purchasePrice?"var(--grn)":"var(--burg)"}}>
                {sel.marketPrice>=sel.purchasePrice?"+":""}CHF {sel.marketPrice-sel.purchasePrice} ({Math.round((sel.marketPrice-sel.purchasePrice)/sel.purchasePrice*100)}%)
              </div>
              <div style={{marginTop:".62rem",fontSize:".78rem",color:"var(--muted)"}}>Gesamtwert ({sel.bottles} Fl.): <strong style={{color:"var(--ink)"}}>CHF {(sel.marketPrice*(sel.bottles||0)).toLocaleString("de-CH")}</strong></div>
            </div>}
            <div style={{marginTop:"1rem"}}>
              <button className="btn bo" style={{fontSize:".7rem"}} onClick={()=>manualUpdate(sel)}>↻ Jetzt aktualisieren</button>
            </div>
          </>}

          <div style={{marginTop:"1.6rem",paddingTop:".85rem",borderTop:"1px solid var(--bdr)",display:"flex",justifyContent:"flex-end"}}>
            <button className="btn bo" style={{color:"var(--burg)",borderColor:"var(--burg)"}} onClick={()=>{setRmWine(sel);setSel(null);}}>🗑 Aus Keller entfernen</button>
          </div>
        </div>
      </div>
    </div>}

    {/* ── Remove popup ── */}
    {rmWine&&<RemovePopup wine={rmWine} onConfirm={handleRemoveConfirm} onCancel={()=>setRmWine(null)}/>}

    {/* ── Toast ── */}
    {toast&&<div className={`toast${toast.err?" err":""}`}>{toast.msg}</div>}
  </div>;
}

// ─── Root ──────────────────────────────────────────────────────────────────────
function Root(){
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setChecking(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user||null);});
    return()=>subscription.unsubscribe();
  },[]);

  if(checking)return <div className="loading-screen"><div className="loading-inner"><div className="sp"/><p>Cave Privée lädt…</p></div></div>;
  if(!user)return <AuthPage onAuth={setUser}/>;
  return <WineApp user={user} onLogout={()=>setUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root));
</script>
</body>
</html>
